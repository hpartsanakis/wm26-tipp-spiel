<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WM26 Tipp-Spiel | Gruppen</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#facc15" />
    <link rel="apple-touch-icon" href="icons/icon-512.png" />
  </head>

  <body>
    <header class="app-header">
      <h1>WM26 Tipp-Spiel</h1>
      <p>Gruppen, Tabellen und aktueller Stand der WM 2026</p>
    </header>

    <nav class="main-nav" aria-label="Hauptnavigation">
      <a href="index.html" class="active" aria-current="page">Gruppen</a>
      <a href="spiele.html">Spiele & Tipps</a>
    </nav>

    <main class="app">
      

      <section class="section-header">
        <h2>Gruppentabellen</h2>
      </section>

      <section id="groupsContainer" class="groups-container" aria-live="polite"></section>

      <section class="stats-grid" aria-label="Übersicht">
        <div class="stat-card">
          <span>Gruppen</span>
          <strong id="totalGroups">0</strong>
        </div>

        <div class="stat-card">
          <span>Mannschaften</span>
          <strong id="totalTeams">0</strong>
        </div>

        <div class="stat-card">
          <span>Spiele</span>
          <strong id="totalMatches">0</strong>
        </div>

        <div class="stat-card">
          <span>Punkte</span>
          <strong id="totalPoints">0</strong>
        </div>
      </section>
    </main>

    <script src="data/groups.js"></script>
    <script src="data/matches.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
