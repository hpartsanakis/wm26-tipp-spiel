<!doctype html>
<html lang="de">
  <head>
    <!-- Zeichensatz -->
    <meta charset="UTF-8" />

    <!-- Optimierung für Handy / iPhone -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Browser-Titel -->
    <title>WM26 Tipp-Spiel | Spiele</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#facc15" />
    <link rel="apple-touch-icon" href="icons/icon-512.png" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="app-header">
      <h1>WM26 Spiele & Tipps</h1>
      <p>Tipps eingeben, Ergebnisse eintragen und Punkte berechnen</p>
    </header>

    <!-- NAVIGATION -->
    <nav class="main-nav">
      <a href="index.html">Gruppen</a>
      <a href="spiele.html" class="active">Spiele & Tipps</a>
    </nav>

    <!-- HAUPTBEREICH -->
    <main class="app">
     
      <!-- FILTER / SUCHE -->
      <section class="toolbar">
        <button data-view="matchday-1" class="filter-btn active">
          Spieltag 1
        </button>
        <button data-view="matchday-2" class="filter-btn">Spieltag 2</button>
        <button data-view="matchday-3" class="filter-btn">Spieltag 3</button>
        <button data-view="Runde der letzten 32" class="filter-btn">
          Runde der letzten 32
        </button>
        <button data-view="Achtelfinale" class="filter-btn">
          Achtelfinale
        </button>
        <button data-view="Viertelfinale" class="filter-btn">
          Viertelfinale
        </button>
        <button data-view="Halbfinale" class="filter-btn">Halbfinale</button>
        <button data-view="Finale" class="filter-btn finale-btn">Finale</button>
      </section>
      <!-- SUCHFELD
      <section class="search-box">
        <label for="searchInput">Suche</label>
        <input
          type="text"
          id="searchInput"
          placeholder="Mannschaft, Gruppe oder Spiel suchen..."
        />
      </section>

      <!-- GRUPPENPHASE 
      <section class="section-header">
        <h2>Gruppenphase</h2>
        <p>Hier stehen alle Gruppenspiele mit Tipp- und Ergebnisfeldern.</p>
      </section>-->

      <!-- Hier rendert JavaScript die Gruppenspiele -->
      <section id="groupMatchesContainer" class="matches-container"></section>

      <!-- K.O.-PHASE 
      <section class="section-header">
        <h2>K.O.-Phase</h2>
        <p>
          Wird später ergänzt: Runde der letzten 32, Achtelfinale,
          Viertelfinale, Halbfinale und Finale.
        </p>
      </section>-->

      <!-- Hier rendert JavaScript später die K.O.-Spiele -->
      <section id="koMatchesContainer" class="matches-container"></section>
    </main>

    <!-- DATEN -->
    <script src="data/groups.js"></script>
    <script src="data/matches.js"></script>

    <!-- APP LOGIK -->
    <script src="js/spiele.js"></script>
  </body>
</html>
